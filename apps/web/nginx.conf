server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed bundle files; HTML stays no-cache so a deploy
  # actually reaches the user.
  location / {
    try_files $uri /index.html;
  }
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
  }

  # Compress text-y mime types — gzip suffices for our payload size.
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
