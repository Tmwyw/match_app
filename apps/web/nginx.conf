server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed bundle files (Vite outputs content-hashed
  # filenames, safe to cache forever).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Non-hashed images (logo.png, logo-light.png, favicon.ico) —
  # moderate cache. Updates ship rarely; week is fine.
  location ~* \.(png|ico|svg|jpg|jpeg|webp)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # Everything else (SPA paths) → index.html.
  #
  # IMPORTANT: the no-cache header must live ON THE FALLBACK LOCATION,
  # not on `location = /index.html`. Telegram opens Mini Apps at `/`
  # which goes through this `location /` block and serves index.html
  # via try_files INTERNAL REDIRECT — `= /index.html` never matches in
  # that path, so prior config let the index.html get default cached
  # by the webview, stranding users on stale JS-bundle hashes after
  # every deploy.
  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  # Compress text-y mime types — gzip suffices for our payload size.
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
